<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Apply the saved theme before first paint to avoid a flash on reload -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('orixis-theme');
          var theme = stored === 'dark' || stored === 'light' ? stored : 'light';
          var root = document.documentElement;
          root.classList.add(theme);
          root.style.colorScheme = theme;
          root.style.backgroundColor = theme === 'dark' ? '#0f172a' : '#ffffff';
        } catch (e) {}
      })();
    </script>

    <title>Orixis: Engineering the Future with AI, Web & Mobile</title>
    <meta
      name="description"
      content="Orixis is a technology studio building AI agents, custom web platforms and mobile apps that help businesses automate, scale and grow."
    />
    <meta name="author" content="Orixis" />
    <meta name="theme-color" content="#0d9488" />

    <meta property="og:title" content="Orixis: Engineering the Future with AI, Web & Mobile" />
    <meta property="og:description" content="AI agents, custom web platforms and mobile apps that drive real business growth." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/orixis-og-image.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="/orixis-og-image.png" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
